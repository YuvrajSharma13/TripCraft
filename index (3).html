<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripCraft | Premium Smart Planner</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="toast">✅ Trip saved!</div>

    <div id="login-overlay">
        <div class="login-card">
            <div class="logo-text">TRIP<span>CRAFT</span></div>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-login" onclick="checkAuth()">Sign In</button>
            <div id="login-err" style="color:#ff4d4d;font-size:0.85rem;margin-top:15px;display:none;font-weight:600;">Invalid Credentials! Access Denied.</div>
        </div>
    </div>

    <div id="main-app">
        <nav>
            <div class="logo">TRIP<span>CRAFT</span></div>
            <div style="display:flex;align-items:center;gap:16px;">
                <button class="nav-saved-btn" onclick="openSavedOverlay()">📁 My Trips</button>
                <button class="nav-saved-btn" style="border-color: #f87171; color: #f87171;" onclick="logout()">Logout</button>
                <div style="font-size:0.8rem;opacity:0.8;">Welcome, Yuvraj</div>
            </div>
        </nav>

        <main>
            <div class="container">
                <div id="input-section">
                    <h1 style="text-align:center;margin-bottom:30px;">Plan Your Trip</h1>
                    <label>Destination</label>
                    <input type="text" id="dest" class="app-input" placeholder="Goa, Paris, Manali, London...">
                    <div style="display:flex;gap:15px;">
                        <div style="flex:1">
                            <label>Days</label>
                            <input type="number" id="days" value="3" min="1" max="7" class="app-input">
                        </div>
                        <div style="flex:2">
                            <label>Budget (₹)</label>
                            <input type="number" id="budget" placeholder="e.g. 25000" class="app-input">
                        </div>
                    </div>
                    <label>Preference</label>
                    <select id="vibe" class="app-input">
                        <option value="Backpacker">Budget Friendly</option>
                        <option value="Mid-Range">Mid-Range Comfort</option>
                        <option value="Luxury">Premium Luxury</option>
                    </select>
                    <button class="btn-action" onclick="generateTrip()">Generate Optimized Plan</button>
                </div>

                <div id="result-section" class="hidden">
                    <div class="result-card">
                        <h2 id="display-title" style="margin:0 0 5px 0"></h2>
                        <div id="budget-info" class="budget-badge"></div>

                        <div class="feature-tabs">
                            <button class="tab-btn active" onclick="switchTab('itinerary')">📅 Itinerary</button>
                            <button class="tab-btn" onclick="switchTab('weather')">🌤️ Weather</button>
                            <button class="tab-btn" onclick="switchTab('map')">🗺️ Map</button>
                            <button class="tab-btn" onclick="switchTab('ai')">🤖 AI Tips</button>
                        </div>

                        <div id="tab-itinerary" class="tab-pane active">
                            <div id="itinerary-list"></div>
                            <div id="react-budget-root"></div>
                            <button class="save-trip-btn" id="save-btn" onclick="saveTrip()">💾 Save This Trip</button>
                        </div>

                        <div id="tab-weather" class="tab-pane">
                            <div id="weather-content"></div>
                        </div>

                        <div id="tab-map" class="tab-pane">
                            <div class="map-wrap"><div id="trip-map"></div></div>
                            <div class="spot-list" id="spot-list"></div>
                        </div>

                        <div id="tab-ai" class="tab-pane">
                            <p style="font-size:0.75rem; color:#64748b; font-weight:700; margin-left:10px; margin-bottom:10px;">SUGGESTED FOR YOU:</p>
                            <div class="ai-tips-grid" id="quick-tips"></div>
                            <div class="ai-chat-box">
                                <div class="chat-messages" id="chat-messages"></div>
                                <div class="chat-input-row">
                                    <input type="text" id="chat-input" placeholder="Ask about foods, safety, etc..." onkeydown="if(event.key==='Enter') sendChat()">
                                    <button class="chat-send-btn" onclick="sendChat()">Send</button>
                                </div>
                            </div>
                        </div>

                        <a class="back-link" onclick="resetPage()">← Plan a New Trip</a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="saved-overlay">
        <div class="saved-modal">
            <div class="saved-modal-header">
                <h2>📁 My Saved Trips</h2>
                <button class="modal-close" onclick="closeSavedOverlay()">✕</button>
            </div>
            <div id="saved-trips-list"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="text/babel" src="BudgetPlanner.js"></script>
    <script src="script.js"></script>
</body>
</html>
